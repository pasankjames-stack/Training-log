<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Health Track</title>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Health Track" />
<meta name="theme-color" content="#F5F6F7" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
 
<style>
  :root {
    --ink: #121417;
    --ink-soft: #565E66;
    --ink-faint: #9AA0A6;
    --paper: #F5F6F7;
    --card: #FFFFFF;
    --line: #E4E6E9;
    --accent: #0E9E90;        /* teal — actions, progression-ready */
    --accent-ink: #0B7268;
    --up: #0B7268;            /* hit the target (teal) */
    --up-bg: #E1F3F0;
    --hold: #565E66;          /* repeat / chase reps (neutral) */
    --hold-bg: #EDEFF1;
    --shadow: 0 1px 2px rgba(18,20,23,.05), 0 8px 24px rgba(18,20,23,.06);
    --display: "Space Grotesk", system-ui, sans-serif;
    --body: "Inter", system-ui, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }
 
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: var(--body);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 18px 16px 120px; }
 
  /* ---- Header ---- */
  header { padding: 6px 2px 14px; }
  .kicker {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--ink-faint); font-weight: 700;
  }
  h1 {
    font-family: var(--display); font-weight: 700; font-size: 27px;
    margin: 2px 0 0; letter-spacing: -.01em; color: var(--accent); cursor: pointer;
  }
  .sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; }
 
  /* ---- Tabs ---- */
  .tabs { display: flex; gap: 6px; margin: 16px 0 14px; }
  .tab {
    flex: 1; border: none; background: transparent; font-family: var(--display);
    font-weight: 600; font-size: 12px; color: var(--ink-soft);
    padding: 9px 1px; border-radius: 10px; cursor: pointer; transition: .15s;
  }
  .tab.on { background: var(--ink); color: #fff; }
 
  /* ---- Day selector ---- */
  .days { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .day {
    border: 1.5px solid var(--line); background: var(--card); border-radius: 13px;
    padding: 12px 13px; text-align: left; cursor: pointer; transition: .15s;
    box-shadow: var(--shadow);
  }
  .day.on { border-color: var(--ink); }
  .day .dname { font-family: var(--display); font-weight: 700; font-size: 15px; }
  .day .dfocus { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
  .day .dlast { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 6px; }
 
  /* ---- Exercise card ---- */
  .ex {
    background: var(--card); border-radius: 15px; padding: 15px 15px 13px;
    margin-bottom: 11px; box-shadow: var(--shadow);
  }
  .ex-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .ex-name { font-family: var(--display); font-weight: 700; font-size: 15.5px; letter-spacing: -.01em; }
  .ex-target { font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft); white-space: nowrap; }
  .ex-note { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; }
 
  .chip {
    display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono);
    font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 20px; margin-top: 9px;
  }
  .chip.up { background: var(--up-bg); color: var(--up); }
  .chip.hold { background: var(--hold-bg); color: var(--hold); }
  .chip.new { background: #ECEEF1; color: var(--ink-soft); }
 
  .sets { margin-top: 11px; display: flex; flex-direction: column; gap: 7px; }
  .set-row { display: grid; grid-template-columns: 22px 1fr 1fr; gap: 8px; align-items: center; }
  .set-no { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); font-weight: 700; }
  .field { position: relative; }
  .field input {
    width: 100%; border: 1.5px solid var(--line); border-radius: 10px;
    padding: 11px 38px 11px 12px; font-family: var(--mono); font-size: 15px; font-weight: 700;
    color: var(--ink); background: #FBFBFC; outline: none; transition: .15s;
  }
  .field input:focus { border-color: var(--accent); background: #fff; }
  .field .unit {
    position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint); pointer-events: none;
  }
  .set-head { display: grid; grid-template-columns: 22px 1fr 1fr; gap: 8px; margin-bottom: -2px; }
  .set-head span { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
  .set-head span:first-child { visibility: hidden; }
 
  .setctl { display: flex; gap: 8px; margin-top: 10px; }
  .setbtn {
    flex: 1; border: 1.5px dashed var(--line); background: transparent; border-radius: 10px;
    padding: 9px; font-family: var(--display); font-weight: 600; font-size: 12.5px;
    color: var(--ink-soft); cursor: pointer; transition: .15s;
  }
  .setbtn:disabled { opacity: .35; cursor: default; }
  .setbtn.add { color: var(--accent-ink); border-color: rgba(14,158,144,.35); }
  .setbtn.add:active { background: rgba(14,158,144,.06); }
 
  /* ---- Save bar ---- */
  .savebar {
    position: fixed; left: 0; right: 0; bottom: 0; padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--paper) 70%, rgba(238,239,241,0));
  }
  .savebar .inner { max-width: 480px; margin: 0 auto; }
  .btn {
    width: 100%; border: none; border-radius: 13px; padding: 15px; cursor: pointer;
    font-family: var(--display); font-weight: 700; font-size: 15px; transition: .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 6px 16px rgba(14,158,144,.28); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { background: var(--ink-faint); box-shadow: none; }
  .savehint { text-align: center; font-size: 11px; color: var(--ink-soft); margin-top: 7px; min-height: 14px; }
 
  /* ---- History ---- */
  .hentry { background: var(--card); border-radius: 14px; padding: 13px 15px; margin-bottom: 9px; box-shadow: var(--shadow); cursor: pointer; }
  .hentry-top { display: flex; justify-content: space-between; align-items: center; }
  .hday { font-family: var(--display); font-weight: 700; font-size: 14.5px; }
  .hdate { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
  .hbody { margin-top: 9px; display: none; }
  .hbody.open { display: block; }
  .hex { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--line); font-size: 12.5px; }
  .hex:first-child { border-top: none; }
  .hex .hn { color: var(--ink-soft); }
  .hex .hv { font-family: var(--mono); font-weight: 700; font-size: 12px; }
 
  .empty { text-align: center; padding: 50px 20px; color: var(--ink-soft); }
  .empty .big { font-family: var(--display); font-weight: 700; font-size: 17px; color: var(--ink); margin-bottom: 6px; }
 
  /* ---- Progress ---- */
  .pcard { background: var(--card); border-radius: 14px; padding: 14px 15px; margin-bottom: 9px; box-shadow: var(--shadow); }
  .pname { font-family: var(--display); font-weight: 700; font-size: 14px; margin-bottom: 9px; }
  .ptrack { display: flex; align-items: flex-end; gap: 5px; height: 56px; }
  .pbar { flex: 1; background: #ECEEF1; border-radius: 5px 5px 0 0; position: relative; min-height: 4px; }
  .pbar.last { background: var(--accent); }
  .pbar .pv { position: absolute; top: -16px; left: 0; right: 0; text-align: center; font-family: var(--mono); font-size: 9.5px; color: var(--ink-soft); }
  .pdates { display: flex; gap: 5px; margin-top: 4px; }
  .pdates span { flex: 1; text-align: center; font-family: var(--mono); font-size: 9px; color: var(--ink-faint); }
 
  /* ---- Dashboard ---- */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat { background: var(--card); border-radius: 14px; padding: 13px 14px; box-shadow: var(--shadow); }
  .stat .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
  .stat .val { font-family: var(--display); font-weight: 700; font-size: 23px; margin-top: 3px; letter-spacing: -.01em; }
  .stat .val small { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .card { background: var(--card); border-radius: 16px; padding: 15px 15px 13px; margin-bottom: 11px; box-shadow: var(--shadow); }
  .card h2 { font-family: var(--display); font-weight: 700; font-size: 15px; margin: 0 0 2px; }
  .card .csub { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 12px; }
  .chart { width: 100%; height: auto; display: block; }
  .axis { font-family: var(--mono); font-size: 9px; fill: var(--ink-faint); }
  .seclabel { font-family: var(--display); font-weight: 700; font-size: 14px; margin: 16px 2px 9px; }
 
  /* ---- Home hub ---- */
  .dotval { font-family: var(--mono); font-size: 10px; fill: var(--accent-ink); font-weight: 700; }
  .chartempty { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); padding: 8px 2px; }
  .navgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .navgrid .navtile { display: flex; align-items: center; justify-content: center; text-align: center; min-height: 56px; }
  .navtile { text-align: left; border: 1.5px solid var(--line); background: var(--card); border-radius: 15px; padding: 15px 14px; cursor: pointer; box-shadow: var(--shadow); transition: .15s; position: relative; color: var(--ink); }
  .navtile:active { transform: translateY(1px); }
  .navtile.wide { grid-column: 1 / -1; }
  .navtile::after { content: "\203a"; position: absolute; top: 12px; right: 14px; color: var(--ink-faint); font-family: var(--display); font-size: 16px; }
  .navtile::after { content: none; }
  .navgrid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-top: 9px; }
  .navgrid3 .navtile { padding: 14px 12px; display: flex; align-items: center; justify-content: center; text-align: center; min-height: 56px; }
  .navgrid3 .nt-name { font-size: 14px; }
  .nt-name { display: block; font-family: var(--display); font-weight: 700; font-size: 15.5px; letter-spacing: -.01em; }
  .nt-sub { display: block; font-size: 11.5px; color: var(--ink); margin-top: 2px; }
  .stats.four { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .stats.four .stat { padding: 9px 7px; border-radius: 11px; text-align: center; }
  .stats.four .stat .lbl { font-size: 8px; letter-spacing: .03em; }
  .stats.four .stat .val { font-size: 16px; margin-top: 2px; }
  .stats.four .stat .val small { font-size: 8.5px; }
  .chartgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 11px; }
  .chartgrid .card { margin-bottom: 0; padding: 13px 13px 10px; }
  .chartgrid .card h2 { font-size: 13px; }
  .chartgrid .card .csub { margin-bottom: 8px; }
 
  /* ---- Weight ---- */
  .weighrow { display: flex; gap: 8px; }
  .weighinput { flex: 1; border: 1.5px solid var(--line); border-radius: 11px; padding: 12px 13px; font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--ink); background: #FBFBFC; outline: none; }
  .weighinput:focus { border-color: var(--accent); background: #fff; }
  .weighbtn { border: none; background: var(--accent); color: #fff; border-radius: 11px; padding: 12px 20px; font-family: var(--display); font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(14,158,144,.25); }
  .weighbtn:active { transform: translateY(1px); }
  .stat.goaltap { cursor: pointer; position: relative; }
  .stat.goaltap:active { background: #FBFBFC; }
  .stat.goaledit { grid-column: 1 / -1; }
  .goalinput { width: 100%; margin-top: 7px; border: 1.5px solid var(--line); border-radius: 9px; padding: 9px 10px; font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--ink); background: #fff; outline: none; }
  .goalinput:focus { border-color: var(--accent); }
  .goalsave { width: 100%; margin-top: 7px; border: none; background: var(--accent); color: #fff; border-radius: 9px; padding: 9px; font-family: var(--display); font-weight: 700; font-size: 13px; cursor: pointer; box-shadow: 0 4px 12px rgba(14,158,144,.25); }
  .goalsave:active { transform: translateY(1px); }
 
  /* ---- Exercise progress (in History) ---- */
  .excol { margin-bottom: 9px; }
  .exhead { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 10px; background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 13px 15px; cursor: pointer; box-shadow: var(--shadow); text-align: left; }
  .exhead:active { transform: translateY(1px); }
  .exh-name { font-family: var(--display); font-weight: 700; font-size: 14.5px; }
  .exh-day { font-size: 11px; color: var(--ink-faint); }
  .exh-w { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); white-space: nowrap; }
  .exbody { display: none; background: var(--card); border-radius: 14px; padding: 10px 12px 12px; box-shadow: var(--shadow); margin-top: 7px; }
  .exbody.open { display: block; }
 
  /* ---- Meals ---- */
  .mealsnap { display:flex; flex-direction:column; align-items:center; gap:3px; width:100%;
    border:1.5px dashed rgba(14,158,144,.4); background:rgba(14,158,144,.04); border-radius:16px;
    padding:22px 16px; cursor:pointer; margin-bottom:14px; text-align:center; }
  .mealsnap:active { background:rgba(14,158,144,.08); }
  .ms-text { font-family:var(--display); font-weight:700; font-size:15px; color:var(--accent-ink); margin-top:4px; }
  .ms-sub { font-size:11.5px; color:var(--ink-soft); }
  .mealacts { display:flex; gap:10px; margin-bottom:14px; }
  .mealact { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    border:1.5px dashed rgba(14,158,144,.4); background:rgba(14,158,144,.04); border-radius:16px;
    padding:20px 12px; cursor:pointer; text-align:center; font:inherit; }
  .mealact:active { background:rgba(14,158,144,.08); }
  .ma-text { font-family:var(--display); font-weight:700; font-size:14px; color:var(--accent-ink); margin-top:3px; }
  .ma-sub { font-size:10.5px; color:var(--ink-soft); line-height:1.3; }
  .mealhint { text-align:center; font-size:11.5px; color:var(--ink-soft); min-height:14px; margin:-6px 0 12px; }
  .mealentry { background:var(--card); border-radius:14px; padding:13px 15px; margin-bottom:9px; box-shadow:var(--shadow); }
  .me-top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .me-right { display:flex; align-items:baseline; gap:9px; flex-shrink:0; }
  .me-del { border:none; background:transparent; color:var(--ink-faint); font-size:13px; line-height:1; padding:3px 5px; cursor:pointer; border-radius:6px; }
  .me-del:active { background:var(--hold-bg); color:var(--ink-soft); }
  .me-delconfirm { display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .me-delq { font-size:12.5px; color:var(--ink); font-weight:600; flex:1; }
  .me-delyes { border:none; background:var(--accent); color:#fff; border-radius:9px; padding:8px 14px; font-family:var(--display); font-weight:700; font-size:12.5px; cursor:pointer; }
  .me-delno { border:1.5px solid var(--line); background:var(--card); color:var(--ink-soft); border-radius:9px; padding:8px 14px; font-family:var(--display); font-weight:600; font-size:12.5px; cursor:pointer; }
  .me-label { font-family:var(--display); font-weight:700; font-size:14.5px; }
  .me-time { font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); white-space:nowrap; }
  .me-macros { display:flex; gap:16px; margin-top:7px; }
  .me-mac { font-size:12px; color:var(--ink-soft); }
  .me-mac b { font-family:var(--mono); font-size:14px; color:var(--ink); font-weight:700; }
  .mealbusy { display:flex; flex-direction:column; align-items:center; gap:10px; padding:28px 16px; margin-bottom:14px; background:var(--card); border-radius:16px; box-shadow:var(--shadow); }
  .mb-spin { width:26px; height:26px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:mbspin .8s linear infinite; }
  @keyframes mbspin { to { transform:rotate(360deg); } }
  .mb-text { font-family:var(--display); font-weight:600; font-size:13.5px; color:var(--ink-soft); }
  .mealconfirm { background:var(--card); border-radius:16px; padding:15px; margin-bottom:14px; box-shadow:var(--shadow); }
  .mc-title { font-family:var(--display); font-weight:700; font-size:15px; margin-bottom:12px; }
  .mc-item { border-top:1px solid var(--line); padding-top:10px; margin-top:10px; }
  .mc-item:first-of-type { border-top:none; padding-top:0; margin-top:0; }
  .mc-name { width:100%; border:1.5px solid var(--line); border-radius:9px; padding:9px 10px; font-family:var(--body); font-size:14px; color:var(--ink); background:#FBFBFC; outline:none; margin-bottom:6px; }
  .mc-row { display:flex; gap:6px; align-items:center; }
  .mc-qty { width:64px; border:1.5px solid var(--line); border-radius:9px; padding:9px 10px; font-family:var(--mono); font-size:14px; text-align:center; background:#FBFBFC; outline:none; }
  .mc-unit { flex:1; border:1.5px solid var(--line); border-radius:9px; padding:9px 10px; font-family:var(--body); font-size:13.5px; background:#FBFBFC; outline:none; }
  .mc-name:focus, .mc-qty:focus, .mc-unit:focus, .mc-note:focus { border-color:var(--accent); background:#fff; }
  .mc-del { border:none; background:transparent; color:var(--ink-faint); font-size:15px; padding:6px 8px; cursor:pointer; }
  .mc-add { width:100%; border:1.5px dashed var(--line); background:transparent; border-radius:10px; padding:9px; margin-top:10px; font-family:var(--display); font-weight:600; font-size:12.5px; color:var(--accent-ink); cursor:pointer; }
  .mc-note { width:100%; height:60px; border:1.5px solid var(--line); border-radius:10px; padding:10px; margin-top:10px; font-family:var(--body); font-size:13.5px; color:var(--ink); background:#FBFBFC; outline:none; resize:vertical; }
  .mc-actions { display:flex; gap:8px; margin-top:12px; }
  .mc-cancel { flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:11px; padding:12px; font-family:var(--display); font-weight:600; font-size:13.5px; color:var(--ink-soft); cursor:pointer; }
  .mc-confirm { flex:2; border:none; background:var(--accent); color:#fff; border-radius:11px; padding:12px; font-family:var(--display); font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:0 4px 12px rgba(14,158,144,.25); }
 
  .toolbtn {
    width: 100%; border: 1.5px solid var(--line); background: var(--card); border-radius: 12px;
    padding: 13px; font-family: var(--display); font-weight: 600; font-size: 13.5px;
    color: var(--ink); cursor: pointer; margin-top: 9px;
  }
  .picker { background: var(--card); border-radius: 14px; padding: 12px; margin-top: 9px; box-shadow: var(--shadow); }
  .picker-top { font-family: var(--display); font-weight: 700; font-size: 14px; margin: 2px 2px 10px; }
  .pickinput { width: 100%; border: 1.5px solid var(--line); border-radius: 11px; padding: 11px 12px;
    font-family: var(--body); font-size: 14px; color: var(--ink); background: #FBFBFC; outline: none; margin-bottom: 9px; }
  .pickinput:focus { border-color: var(--accent); background: #fff; }
  .pickhint { font-size: 12px; color: var(--ink-soft); padding: 4px 2px 10px; }
  .pickitem { width: 100%; display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
    border: 1.5px solid var(--line); background: #FBFBFC; border-radius: 11px; padding: 11px 13px; margin-bottom: 7px;
    cursor: pointer; text-align: left; }
  .pickitem:active { background: rgba(14,158,144,.06); border-color: rgba(14,158,144,.35); }
  .pi-name { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--ink); }
  .pi-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); white-space: nowrap; }
  .pickempty { font-size: 12px; color: var(--ink-soft); padding: 6px 2px 12px; }
  .pickcustom { width: 100%; border: 1.5px dashed var(--line); background: transparent; border-radius: 11px;
    padding: 10px; font-family: var(--display); font-weight: 600; font-size: 12.5px; color: var(--accent-ink); cursor: pointer; margin-top: 4px; }
  .pickcancel { width: 100%; border: none; background: transparent; border-radius: 11px;
    padding: 9px; font-family: var(--display); font-weight: 600; font-size: 12.5px; color: var(--ink-soft); cursor: pointer; margin-top: 4px; }
  .toolbtn.danger { color: var(--accent-ink); }
  .csvhint { font-size: 11.5px; color: var(--ink-soft); margin: 12px 2px 6px; }
  .csvbox {

function jsonp(url, cb) {
  const fn = "__cb" + Math.random().toString(36).slice(2);
  let done = false;
  const cleanup = () => { delete window[fn]; sc.remove(); clearTimeout(timer); };
  window[fn] = (d) => { if (done) return; done = true; cleanup(); cb(null, d); };
  const sc = document.createElement("script");
  sc.src = url + (url.includes("?") ? "&" : "?") + "callback=" + fn + "&t=" + Date.now();
  sc.onerror = () => { if (done) return; done = true; cleanup(); cb(new Error("net")); };
  const timer = setTimeout(() => { if (done) return; done = true; cleanup(); cb(new Error("timeout")); }, 12000);
  document.body.appendChild(sc);
}

// Turn flat Log rows [date, day, exercise, set, weight, reps] back into sessions.
// Returns null when there's no data, so we never clobber what we have.
function reconstructSessions(rows) {
  if (!rows || rows.length < 2) return null;
  const map = {};
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const date = (r[0] == null) ? "" : String(r[0]).slice(0, 10);
    const day  = (r[1] == null) ? "" : String(r[1]);
    const name = (r[2] == null) ? "" : String(r[2]);
    if (!date || !day) continue;
    const setNo = parseInt(r[3], 10) || 1;
    const wRaw = r[4], rRaw = r[5];
    const w = (wRaw === "BW" || wRaw === "" || wRaw == null || isNaN(+wRaw)) ? "" : +wRaw;
    const reps = (rRaw === "" || rRaw == null || isNaN(+rRaw)) ? "" : +rRaw;
    const key = date + "|" + day;
    if (!map[key]) map[key] = { date, day, ex: {} };
    const id = resolveExId(day, name);
    if (!map[key].ex[id]) map[key].ex[id] = [];
    map[key].ex[id][setNo - 1] = { w, r: reps };
  }
  return Object.keys(map).map(k => {
    const s = map[k];
    Object.keys(s.ex).forEach(id => { s.ex[id] = s.ex[id].map(x => x || { w: "", r: "" }); });
    return s;
  }).sort((a, b) => a.date.localeCompare(b.date));

function suggestion(ex, last) {
  if (!last || !last.ex[ex.id]) return { cls:"new", text:"First time — start light" };
  const sets = last.ex[ex.id];
  const reps = sets.map(s => +s.r || 0);

// Generic scatter plot. points = [{label, value}]
// opts: { target, unit, zeroBase (default true), empty }
function scatterChart(points, opts) {
  opts = opts || {};
  if (!points.length) return `<div class="chartempty">${opts.empty || "Nothing logged yet."}</div>`;
  const W = 320, H = opts.height || 132, padL = 8, padR = 10, padT = 18, padB = 20;
  const vals = points.map(p => p.value);
  let min, max;
  if (opts.zeroBase === false) {
    const lo = Math.min(...vals, opts.target != null ? opts.target : Infinity);
    const hi = Math.max(...vals, opts.target != null ? opts.target : -Infinity);
    const pad = Math.max((hi - lo) * 0.15, 1);
    min = lo - pad; max = hi + pad;
  } else {
    min = 0; max = Math.max(...vals, opts.target || 0, 1);
  }
  const span = (max - min) || 1;
  const n = points.length;
  const x = i => n === 1 ? W / 2 : padL + (i * (W - padL - padR)) / (n - 1);
  const y = v => padT + (1 - (v - min) / span) * (H - padT - padB);
  let target = "";
  if (opts.target != null) {
    const ty = y(opts.target);
    target = `<line x1="${padL}" y1="${ty.toFixed(1)}" x2="${W - padR}" y2="${ty.toFixed(1)}" stroke="var(--ink-faint)" stroke-width="1" stroke-dasharray="3 3" opacity=".55"/>
      <text class="axis" x="${(W - padR).toFixed(1)}" y="${(ty - 4).toFixed(1)}" text-anchor="end">${opts.target}${opts.unit || ""}</text>`;
  }
  let linePath = "", areaPath = "";
  const baseY = H - padB;
  points.forEach((p, i) => {
    const px = x(i), py = y(p.value);
    linePath += (i ? " L " : "M ") + px.toFixed(1) + " " + py.toFixed(1);
  });
  areaPath = `M ${x(0).toFixed(1)} ${baseY.toFixed(1)}`;
  points.forEach((p, i) => { areaPath += ` L ${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`; });
  areaPath += ` L ${x(n - 1).toFixed(1)} ${baseY.toFixed(1)} Z`;
 
  let dots = "", labels = "";
  points.forEach((p, i) => {
    const last = i === n - 1;
    const cx = x(i), cy = y(p.value);
    dots += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${last ? 4 : 3}" fill="${last ? "var(--accent)" : "var(--ink-faint)"}"/>`;
    if (last) {
      const dv = (opts.zeroBase === false) ? p.value : Math.round(p.value).toLocaleString();
      dots += `<text class="dotval" x="${cx.toFixed(1)}" y="${(cy - 8).toFixed(1)}" text-anchor="middle">${dv}${opts.unit || ""}</text>`;
    }
    const show = n <= 8 || i === 0 || last || i === Math.floor(n / 2);
    if (show) labels += `<text class="axis" x="${cx.toFixed(1)}" y="${H - 5}" text-anchor="middle">${p.label}</text>`;
  });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <path d="${areaPath}" fill="var(--accent)" opacity="0.1"/>
    ${target}
    <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${labels}</svg>`;
}

    if (hist.length) prog.push({ day, ex, hist });

}

        <span class="exh-w">${latest} kg \u203a</span>

    </div>`;

}

async function saveSession() {
  const exObj = {};
  let any = false;
  plan[currentDay].ex.forEach(ex => {
    exObj[ex.id] = draft[ex.id].map(s => {
      const w = ex.type === "kg" ? (s.w === "" ? "" : +s.w) : 0;
      const r = s.r === "" ? "" : +s.r;
      if (r !== "") any = true;
      return { w, r };
    });
  });
  const hint = document.getElementById("saveHint");
  if (!any) { hint.textContent = "Enter at least one set first."; return; }
 
  // Replace a same-day same-type entry made today, else append
  const today = isoToday();
  const idx = data.sessions.findIndex(s => s.date === today && s.day === currentDay);
  const entry = { date: today, day: currentDay, ex: exObj };
  if (idx >= 0) data.sessions[idx] = entry; else data.sessions.push(entry);
 
  const ok = await persist();
  if (ok) syncToSheet();
  hint.textContent = ok
    ? (SHEET_SYNC_URL ? "Saved ✓  — synced to your sheet" : "Saved ✓  — carried into your history")
    : "Couldn't save — try again";
  if (ok) setTimeout(() => { hint.textContent = ""; render(); }, 1200);
}

function buildCSV() {
  const rows = [["date","day","exercise","set","weight_kg","reps_or_sec"]];
  data.sessions.forEach(s => {
    const dp = plan[s.day];
    if (!dp) return;
    dp.ex.forEach(ex => {
      const sets = s.ex[ex.id]; if (!sets) return;
      sets.forEach((x, i) => rows.push([s.date, s.day, ex.name, i+1, ex.type==="kg"?(x.w||""):"BW", x.r||""]));
    });
  });
  return rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
}
 
async function exportCSV() {
  const csv = buildCSV();
  let copied = false;
  try { await navigator.clipboard.writeText(csv); copied = true; } catch (e) { /* clipboard blocked — fall back to manual copy */ }
  const out = document.getElementById("exportOut");
  out.innerHTML = `<div class="csvhint">${copied
      ? "Copied to clipboard ✓ — open a Google Sheet and paste. Or copy again from the box below."
      : "Tap inside the box, select all, and copy — then paste into a Google Sheet."}</div>
    <textarea class="csvbox" readonly>${csv.replace(/</g,"&lt;")}</textarea>`;
  const ta = out.querySelector("textarea");
  ta.focus(); ta.select();
}

// ---------- Dashboard helpers ----------
function daysAgo(dateStr) {
  const d = new Date(dateStr + "T00:00:00"), now = new Date();
  return Math.round((now.setHours(0,0,0,0) - d.setHours(0,0,0,0)) / 86400000);
}
function prettyShort(dateStr) {
  return new Date(dateStr + "T00:00:00").toLocaleDateString(undefined, { day:"numeric", month:"short" });
}
// One entry per session, with total weighted volume (weight × reps)
function dashSessions() {
  return data.sessions.map(s => {
    const dp = plan[s.day]; let vol = 0;
    if (dp) dp.ex.forEach(ex => {
      if (ex.type !== "kg") return;
      const sets = s.ex[ex.id]; if (!sets) return;
      sets.forEach(x => { vol += (+x.w || 0) * (+x.r || 0); });
    });
    return { date: s.date, day: s.day, volume: vol };
  }).sort((a,b) => a.date.localeCompare(b.date));
}
// Hand-drawn SVG line/area chart of volume over time
function volumeChart(sessions) {
  if (sessions.length < 2) {
    const v = sessions.length ? Math.round(sessions[0].volume).toLocaleString() : 0;
    return `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft);padding:6px 0">
      ${v} kg so far — log another session to start the trend.</div>`;
  }
  const W = 320, H = 120, padL = 6, padR = 6, padT = 16, padB = 18;
  const vals = sessions.map(s => s.volume);
  const max = Math.max(...vals), min = Math.min(...vals, 0);
  const span = (max - min) || 1;
  const x = i => padL + (i * (W - padL - padR)) / (sessions.length - 1);
  const y = v => padT + (1 - (v - min) / span) * (H - padT - padB);
  let line = "", area = `M ${x(0)} ${H - padB}`;
  sessions.forEach((s, i) => {
    const px = x(i), py = y(s.volume);
    line += (i ? " L " : "M ") + px.toFixed(1) + " " + py.toFixed(1);
    area += ` L ${px.toFixed(1)} ${py.toFixed(1)}`;
  });
  area += ` L ${x(sessions.length - 1)} ${H - padB} Z`;
  let dots = "", labels = "";
  sessions.forEach((s, i) => {
    const lastOne = i === sessions.length - 1;
    const show = sessions.length <= 8 || i === 0 || lastOne || i === Math.floor(sessions.length / 2);
    dots += `<circle cx="${x(i).toFixed(1)}" cy="${y(s.volume).toFixed(1)}" r="${lastOne ? 3.5 : 2.2}" fill="${lastOne ? 'var(--accent)' : 'var(--ink-faint)'}"/>`;
    if (show) labels += `<text class="axis" x="${x(i).toFixed(1)}" y="${H - 5}" text-anchor="middle">${prettyShort(s.date)}</text>`;
  });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <path d="${area}" fill="var(--accent)" opacity="0.08"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${labels}
  </svg>`;
}
 
function renderDashboard() {
  if (!data.sessions.length) {
    view.innerHTML = `<div class="empty"><div class="big">No sessions yet</div>Log a workout and your dashboard fills in.</div>`;
    return;
  }
  const sessions = dashSessions();
  const totalVol = sessions.reduce((a, x) => a + x.volume, 0);
  const last = sessions[sessions.length - 1];
  const ago = daysAgo(last.date);
  const lastTxt = ago <= 0 ? "Today" : ago === 1 ? "Yesterday" : ago + " days ago";
  const week = sessions.filter(s => daysAgo(s.date) <= 6).length;
 
  let html = `<div class="stats">
    <div class="stat"><div class="lbl">Sessions</div><div class="val">${sessions.length}</div></div>
    <div class="stat"><div class="lbl">Last 7 days</div><div class="val">${week} <small>session${week===1?"":"s"}</small></div></div>
    <div class="stat"><div class="lbl">Total volume</div><div class="val">${Math.round(totalVol).toLocaleString()} <small>kg</small></div></div>
    <div class="stat"><div class="lbl">Last trained</div><div class="val" style="font-size:18px">${lastTxt}</div></div>
  </div>`;
 
  html += `<div class="card"><h2>Volume per session</h2>
    <div class="csub">Total weight moved (weight × reps) each session</div>
    ${volumeChart(sessions.slice(-14))}</div>`;
 
  // Per-exercise top working weight
  const weighted = [];
  DAYS.forEach(day => plan[day].ex.forEach(ex => { if (ex.type === "kg") weighted.push({ day, ex }); }));
  let bodyEx = "";
  weighted.forEach(({day, ex}) => {
    const hist = data.sessions.filter(s => s.day === day && s.ex[ex.id])
      .sort((a,b) => a.date.localeCompare(b.date))
      .map(s => ({ date: s.date, w: Math.max(...s.ex[ex.id].map(x => +x.w || 0)) }));
    if (!hist.length) return;
    const max = Math.max(...hist.map(h => h.w), 1);
    let bars = "", dates = "";
    hist.slice(-6).forEach((h, i, arr) => {
      const isLast = i === arr.length - 1;
      const ht = Math.max(8, (h.w / max) * 100);
      bars += `<div class="pbar ${isLast?"last":""}" style="height:${ht}%"><span class="pv">${h.w}</span></div>`;
      dates += `<span>${prettyShort(h.date)}</span>`;
    });
    bodyEx += `<div class="pcard"><div class="pname">${ex.name} <span style="color:var(--ink-faint);font-weight:400">· ${day}</span></div>
      <div class="ptrack">${bars}</div><div class="pdates">${dates}</div></div>`;
  });
  if (bodyEx) html += `<div class="seclabel">Working weight by exercise</div>` + bodyEx;
 
  view.innerHTML = html;
}

function pickResultsHtml(q) {
  if (!exerciseList.length) return `<div class="pickempty">No exercise list yet. Add an “Exercises” tab to your sheet, or add a blank one below.</div>`;
  q = (q || "").trim().toLowerCase();
  if (!q) return `<div class="pickhint">Start typing to search your ${exerciseList.length} exercises.</div>`;
  const matches = exerciseList
    .map((e, i) => ({ e, i }))
    .filter(o => (o.e.name || "").toLowerCase().includes(q) || (o.e.muscle || "").toLowerCase().includes(q));
  if (!matches.length) return `<div class="pickempty">No match for “${escHtml(q)}”.</div>`;
  let h = "";
  matches.slice(0, 12).forEach(({ e, i }) => {
    const reps = e.lo === e.hi ? e.lo : e.lo + "\u2013" + e.hi;
    const ut = e.type === "sec" ? "sec" : (e.type === "bw" ? "bodyweight" : "kg");
    const mus = e.muscle ? " \u00b7 " + escHtml(e.muscle) : "";
    h += `<button class="pickitem" data-pick="${i}">
      <span class="pi-name">${escHtml(e.name)}</span>
      <span class="pi-meta">${ut} \u00b7 ${e.sets}\u00d7${reps}${mus}</span>
    </button>`;
  });
  return h;
}
 
function wireEditDay(day) {
  document.getElementById("backDays").onclick = () => { savePlan(); editingDay = null; pickingExercise = false; render(); };
 
  const nameInp = document.getElementById("dayName");
  nameInp.onchange = () => {
    const nn = nameInp.value.trim();
    if (!nn || nn === day) return;
    if (plan[nn]) { nameInp.value = day; return; }   // name already used
    const newPlan = {};
    DAYS.forEach(k => { newPlan[k === day ? nn : k] = plan[k]; });
    plan = newPlan;
    data.sessions.forEach(sn => { if (sn.day === day) sn.day = nn; });   // keep history attached
    if (currentDay === day) currentDay = nn;
    editingDay = nn;
    refreshDays(); savePlan(); render();
  };
 
  document.getElementById("dayFocus").oninput = (e) => { plan[editingDay].focus = e.target.value; savePlan(); };
 
  view.querySelectorAll(".excard input, .excard select").forEach(el => {
    const handler = () => {
      const ex = plan[editingDay].ex[+el.dataset.i], f = el.dataset.f;
      if (f === "sets" || f === "lo" || f === "hi") {
        const v = parseInt(el.value, 10);
        if (!isNaN(v) && v > 0) ex[f] = v;
      } else ex[f] = el.value;
      savePlan();
    };
    if (el.tagName === "SELECT") el.onchange = handler; else el.oninput = handler;
  });
 
  view.querySelectorAll("[data-del]").forEach(b => b.onclick = () => {
    plan[editingDay].ex.splice(+b.dataset.del, 1); savePlan(); render();
  });
 
  if (pickingExercise) {
    const search = document.getElementById("pickSearch");
    const results = document.getElementById("pickResults");
    const renderResults = () => {
      results.innerHTML = pickResultsHtml(search ? search.value : "");
      results.querySelectorAll("[data-pick]").forEach(b => b.onclick = () => {
        const e = exerciseList[+b.dataset.pick]; if (!e) return;
        plan[editingDay].ex.push({ id: slug(e.name), name: e.name, sets: e.sets || 3, lo: e.lo || 8, hi: e.hi || 12, type: e.type || "kg", note: e.note || "" });
        pickingExercise = false; savePlan(); render();
      });
    };
    if (search) { search.oninput = renderResults; search.focus(); }
    renderResults();
    const pc = document.getElementById("pickCustom");
    if (pc) pc.onclick = () => { plan[editingDay].ex.push({ id: uid(), name: "", sets: 3, lo: 8, hi: 12, type: "kg", note: "" }); pickingExercise = false; savePlan(); render(); };
    const px = document.getElementById("pickCancel");
    if (px) px.onclick = () => { pickingExercise = false; render(); };
  } else {
    const addBtn = document.getElementById("addExBtn");
    if (addBtn) addBtn.onclick = () => { pickingExercise = true; render(); refreshExercises(); };
  }
 
  document.getElementById("delDayBtn").onclick = () => {
    const zone = document.getElementById("delDayZone");
    zone.innerHTML = `<div class="confirm">Delete \u201c${escHtml(day)}\u201d? Logged history stays saved but won't be shown.</div>
      <button class="toolbtn danger" id="delYes">Yes, delete day</button>
      <button class="toolbtn" id="delNo">Cancel</button>`;
    document.getElementById("delYes").onclick = () => {
      delete plan[day]; refreshDays(); savePlan(); editingDay = null; render();
    };
    document.getElementById("delNo").onclick = () => render();
  };
}
 
function armResetPlan() {
  const zone = document.getElementById("resetPlanZone");
  zone.innerHTML = `<div class="confirm">Replace your routine with the original default plan? This won't touch your logged sessions.</div>
    <button class="toolbtn danger" id="rpYes">Yes, reset plan</button>
    <button class="toolbtn" id="rpNo">Cancel</button>`;
  document.getElementById("rpYes").onclick = () => {
    plan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
    refreshDays(); savePlan(); editingDay = null; render();
  };
  document.getElementById("rpNo").onclick = () => render();
}
 
// ---------- Meals (photo → detect → confirm → estimate) ----------
const MEALS_KEY = "ulp-meals-v1";
let meals = [];
let mealStage = "idle";        // idle | detecting | confirming | estimating
let pendingTs = null;
let pendingItems = [];
let pendingNote = "";
let mealDeleteTs = null;       // ts of the meal currently asking "delete?"
 
function loadMealsCache() {
  try { const v = localStorage.getItem(MEALS_KEY); if (v) meals = JSON.parse(v); } catch (e) {}
}
function cacheMeals() { try { localStorage.setItem(MEALS_KEY, JSON.stringify(meals)); } catch (e) {} }
 
function fileToCompressedBase64(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL("image/jpeg", quality).split(",")[1]);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("img")); };
    img.src = url;
  });
}
 
function mealHint(msg) { const h = document.getElementById("mealHint"); if (h) h.textContent = msg || ""; }
 
function postDetect(b64, ts) {
  try {
    fetch(SHEET_SYNC_URL, { method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "detectMeal", token: APP_TOKEN, ts, image: b64 }) });
  } catch (e) {}
}
function pollDetect(ts, tries) {
  jsonp(SHEET_SYNC_URL + "?action=getPending&ts=" + ts, (err, payload) => {
    if (mealStage !== "detecting" || pendingTs !== ts) return;
    if (!err && payload && payload.items) {
      pendingItems = payload.items.map(it => ({ name: it.name || "", qty: (it.qty != null ? it.qty : 1), unit: it.unit || "" }));
      pendingNote = "";
      mealStage = "confirming";
      renderMeals();
      return;
    }
    if (tries <= 0) { mealStage = "idle"; renderMeals(); mealHint("Couldn't detect that photo — check Executions, or try again."); return; }
    setTimeout(() => pollDetect(ts, tries - 1), 2500);
  });
}
 
function postFinalize(ts, date, items, note) {
  try {
    fetch(SHEET_SYNC_URL, { method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "finalizeMeal", token: APP_TOKEN, ts, date, items, note }) });
  } catch (e) {}
}
function pollForMeal(ts, tries, cb) {
  jsonp(SHEET_SYNC_URL + "?action=getMeals", (err, payload) => {
    if (!err && payload && payload.meals) {
      const found = payload.meals.find(r => +r[0] === ts);
      if (found) {
        meals = payload.meals.map(r => ({ ts:+r[0], date:r[1], label:r[2], kcal:r[3], protein:r[4] })).sort((a, b) => b.ts - a.ts);
        cacheMeals(); cb(null, found); return;
      }
    }
    if (tries <= 0) { cb(new Error("timeout")); return; }
    setTimeout(() => pollForMeal(ts, tries - 1, cb), 2500);
  });
}
 
function fetchMeals(cb) {
  if (!SHEET_SYNC_URL) { if (cb) cb(); return; }
  jsonp(SHEET_SYNC_URL + "?action=getMeals", (err, payload) => {
    if (!err && payload && payload.meals) {
      meals = payload.meals.map(r => ({ ts:+r[0], date:r[1], label:r[2], kcal:r[3], protein:r[4] })).sort((a, b) => b.ts - a.ts);
      cacheMeals();
    }
    if (cb) cb();
  });
}
function refreshMeals() { fetchMeals(() => {
  if (currentTab === "home") render();
  else if (currentTab === "meals" && mealStage === "idle") renderMeals();
}); }
 
async function onMealPhoto(e) {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  if (!SHEET_SYNC_URL) { mealHint("Sheet sync isn't set up."); return; }
  if (!APP_TOKEN) { mealHint("Set your APP_TOKEN in the code first."); return; }
  mealDeleteTs = null;
  let b64;
  try { b64 = await fileToCompressedBase64(f, 1024, 0.7); }
  catch (err) { mealHint("Couldn't read that photo — try again."); return; }
  pendingTs = Date.now();
  mealStage = "detecting";
  renderMeals();
  postDetect(b64, pendingTs);
  pollDetect(pendingTs, 6);
}
 
// Manual entry — skip the photo/detect step and go straight to the
// confirm screen with one blank item for the user to describe.
function startManualMeal() {
  if (!SHEET_SYNC_URL) { mealHint("Sheet sync isn't set up."); return; }
  if (!APP_TOKEN) { mealHint("Set your APP_TOKEN in the code first."); return; }
  mealDeleteTs = null;
  pendingTs = Date.now();
  pendingItems = [{ name:"", qty:1, unit:"" }];
  pendingNote = "";
  mealStage = "confirming";
  renderMeals();
}
 
function confirmMeal() {
  const ts = pendingTs, date = isoToday();
  const items = pendingItems.slice(), note = pendingNote;
  mealStage = "estimating";
  renderMeals();
  postFinalize(ts, date, items, note);
  pollForMeal(ts, 6, (err) => {
    if (pendingTs !== ts) return;
    mealStage = "idle"; pendingTs = null; pendingItems = []; pendingNote = "";
    renderMeals();
    if (err) mealHint("Still estimating — switch tabs and back to refresh.");
  });
}
 
function cancelMeal() {
  mealStage = "idle"; pendingTs = null; pendingItems = []; pendingNote = "";
  renderMeals();
}
 
// Remove a meal locally + on the sheet. localStorage updates immediately;
// the sheet delete keeps it from reappearing on the next refresh.
function deleteMeal(ts) {
  meals = meals.filter(m => +m.ts !== +ts);
  cacheMeals();
  mealDeleteTs = null;
  pushMealDelete(ts);
  renderMeals();
}
function pushMealDelete(ts) {
  if (!SHEET_SYNC_URL) return;
  try {
    fetch(SHEET_SYNC_URL, { method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "deleteMeal", token: APP_TOKEN, ts }) });
  } catch (e) { /* offline — local copy is already updated */ }
}
 
function mealConfirmHtml() {
  let rows = "";
  pendingItems.forEach((it, i) => {
    rows += `<div class="mc-item">
      <input class="mc-name" data-i="${i}" data-f="name" value="${escAttr(it.name)}" placeholder="Food">
      <div class="mc-row">
        <input class="mc-qty" data-i="${i}" data-f="qty" inputmode="decimal" value="${escAttr(String(it.qty))}" placeholder="qty">
        <input class="mc-unit" data-i="${i}" data-f="unit" value="${escAttr(it.unit)}" placeholder="unit">
        <button class="mc-del" data-del="${i}">✕</button>
      </div>
    </div>`;
  });
  return `<div class="mealconfirm">
    <div class="mc-title">Confirm what you ate</div>
    ${rows}
    <button class="mc-add" id="mcAdd">+ Add item</button>
    <textarea class="mc-note" id="mcNote" placeholder="Anything to add? e.g. extra olive oil, large portion">${escHtml(pendingNote)}</textarea>
    <div class="mc-actions">
      <button class="mc-cancel" id="mcCancel">Cancel</button>
      <button class="mc-confirm" id="mcConfirm">Confirm &amp; estimate</button>
    </div>
  </div>`;
}
 
function renderMeals() {
  const today = isoToday();
  const todays = meals.filter(m => m.date === today);
  const kcal = todays.reduce((a, m) => a + (+m.kcal || 0), 0);
  const prot = todays.reduce((a, m) => a + (+m.protein || 0), 0);
 
  let html = `<div class="stats">
    <div class="stat"><div class="lbl">Today · calories</div><div class="val">${kcal || 0} <small>/ 2000 kcal</small></div></div>
    <div class="stat"><div class="lbl">Today · protein</div><div class="val">${prot || 0} <small>/ 135 g</small></div></div>
  </div>`;
 
  if (mealStage === "confirming") {
    html += mealConfirmHtml();
  } else if (mealStage === "detecting" || mealStage === "estimating") {
    html += `<div class="mealbusy"><div class="mb-spin"></div>
      <div class="mb-text">${mealStage === "detecting" ? "Detecting what's on the plate…" : "Estimating calories…"}</div></div>`;
  } else {
    html += `<div class="mealacts">
      <label class="mealact">
        <input type="file" accept="image/*" capture="environment" id="mealFile" hidden>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-ink)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5A1.5 1.5 0 0 1 4.5 7H7l1.2-1.8a1 1 0 0 1 .83-.45h5.94a1 1 0 0 1 .83.45L17 7h2.5A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5z"/><circle cx="12" cy="12.5" r="3.2"/></svg>
        <span class="ma-text">Snap a meal</span>
      </label>
      <button class="mealact" id="mealManual">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-ink)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        <span class="ma-text">Add manually</span>
      </button>
    </div>`;
  }
 
  html += `<div class="mealhint" id="mealHint"></div>`;
 
  if (!meals.length) {
    html += `<div class="empty"><div class="big">No meals logged yet</div>Snap or describe your first meal and it'll show up here.</div>`;
  } else {
    meals.slice(0, 40).forEach(m => {
      const d = new Date(m.ts);
      const tt = isNaN(d.getTime()) ? "" : d.toLocaleString(undefined, { weekday:"short", hour:"numeric", minute:"2-digit" });
      if (+m.ts === +mealDeleteTs) {
        html += `<div class="mealentry">
          <div class="me-top"><span class="me-label">${escHtml(m.label || "meal")}</span><span class="me-time">${tt}</span></div>
          <div class="me-delconfirm">
            <span class="me-delq">Delete this meal?</span>
            <button class="me-delyes" data-mealdelyes="${m.ts}">Delete</button>
            <button class="me-delno" data-mealdelno="1">Cancel</button>
          </div>
        </div>`;
      } else {
        html += `<div class="mealentry">
          <div class="me-top"><span class="me-label">${escHtml(m.label || "meal")}</span>
            <span class="me-right"><span class="me-time">${tt}</span><button class="me-del" data-mealdel="${m.ts}" aria-label="Delete meal">✕</button></span></div>
          <div class="me-macros"><span class="me-mac"><b>${m.kcal || "–"}</b> kcal</span><span class="me-mac"><b>${m.protein || "–"}</b> g protein</span></div>
        </div>`;
      }
    });
  }
 
  view.innerHTML = html;
 
  // Delete controls on logged meals (active in any stage)
  view.querySelectorAll("[data-mealdel]").forEach(b => b.onclick = () => { mealDeleteTs = +b.dataset.mealdel; renderMeals(); });
  view.querySelectorAll("[data-mealdelyes]").forEach(b => b.onclick = () => deleteMeal(+b.dataset.mealdelyes));
  view.querySelectorAll("[data-mealdelno]").forEach(b => b.onclick = () => { mealDeleteTs = null; renderMeals(); });
 
  if (mealStage === "idle") {
    const file = document.getElementById("mealFile");
    if (file) file.onchange = onMealPhoto;
    const manual = document.getElementById("mealManual");
    if (manual) manual.onclick = startManualMeal;
  } else if (mealStage === "confirming") {
    view.querySelectorAll(".mc-name, .mc-qty, .mc-unit").forEach(el => {
      el.oninput = () => { pendingItems[+el.dataset.i][el.dataset.f] = el.value; };
    });
    const note = document.getElementById("mcNote");
    if (note) note.oninput = () => { pendingNote = note.value; };
    const add = document.getElementById("mcAdd");
    if (add) add.onclick = () => { pendingItems.push({ name:"", qty:1, unit:"" }); renderMeals(); };
    view.querySelectorAll(".mc-del").forEach(b => b.onclick = () => { pendingItems.splice(+b.dataset.del, 1); renderMeals(); });
    const cf = document.getElementById("mcConfirm"); if (cf) cf.onclick = confirmMeal;
    const cx = document.getElementById("mcCancel"); if (cx) cx.onclick = cancelMeal;
  }
  wireHome();
}
 
// ---------- Weight tracking (local) ----------
const WEIGHT_KEY = "ulp-weight-v1";
const GOAL_KEY = "ulp-goal-v1";
let WEIGHT_GOAL = 62.5;   // default target; overridden by a saved value if present
function loadGoal() {
  try { const v = localStorage.getItem(GOAL_KEY); if (v != null && !isNaN(+v) && +v > 0) WEIGHT_GOAL = +v; } catch (e) {}
}
function setGoal(kg) {
  WEIGHT_GOAL = kg;
  try { localStorage.setItem(GOAL_KEY, String(kg)); } catch (e) {}
  pushGoalToSheet(kg);
}
function pushGoalToSheet(kg) {
  if (!SHEET_SYNC_URL) return;
  try {
    fetch(SHEET_SYNC_URL, { method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "saveGoal", token: APP_TOKEN, kg }) });
  } catch (e) { /* offline — local copy is still saved */ }
}
function fetchGoal(cb) {
  if (!SHEET_SYNC_URL) { if (cb) cb(); return; }
  jsonp(SHEET_SYNC_URL + "?action=getGoal", (err, payload) => {
    if (!err && payload && payload.goal != null && payload.goal !== "" && !isNaN(+payload.goal) && +payload.goal > 0) {
      WEIGHT_GOAL = +payload.goal;
      try { localStorage.setItem(GOAL_KEY, String(WEIGHT_GOAL)); } catch (e) {}
    }
    if (cb) cb();
  });
}
function refreshGoal() { fetchGoal(() => { if (currentTab === "home" || currentTab === "weight") render(); }); }
let weights = [];   // [{date, kg}]
let goalEditing = false;   // is the Goal stat showing its inline editor?
 
// ---------- Standardised exercise list (from the sheet) ----------
const EXLIST_KEY = "ulp-exlist-v1";
let exerciseList = [];        // [{name, type, sets, lo, hi, note}]
let pickingExercise = false;  // is the routine builder showing the exercise chooser?
function loadExListCache() { try { const v = localStorage.getItem(EXLIST_KEY); if (v) exerciseList = JSON.parse(v); } catch (e) {} }
function fetchExercises(cb) {
  if (!SHEET_SYNC_URL) { if (cb) cb(); return; }
  jsonp(SHEET_SYNC_URL + "?action=getExercises", (err, payload) => {
    if (!err && payload && Array.isArray(payload.exercises)) {
      exerciseList = payload.exercises;
      try { localStorage.setItem(EXLIST_KEY, JSON.stringify(exerciseList)); } catch (e) {}
    }
    if (cb) cb();
  });
}
function refreshExercises() { fetchExercises(() => { if (currentTab === "edit" && editingDay) render(); }); }
function loadWeightCache() { try { const v = localStorage.getItem(WEIGHT_KEY); if (v) weights = JSON.parse(v); } catch (e) {} }
function cacheWeights() { try { localStorage.setItem(WEIGHT_KEY, JSON.stringify(weights)); } catch (e) {} }
function sortedWeights() { return [...weights].sort((a, b) => a.date.localeCompare(b.date)); }
function logWeight(kg) {
  const date = isoToday();
  const idx = weights.findIndex(w => w.date === date);
  if (idx >= 0) weights[idx].kg = kg; else weights.push({ date, kg });
  cacheWeights();
  pushWeightToSheet(date, kg);
}
 
// --- Cross-device weight sync (same Google Sheet web app) ---
function pushWeightToSheet(date, kg) {
  if (!SHEET_SYNC_URL) return;
  try {
    fetch(SHEET_SYNC_URL, { method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "saveWeight", token: APP_TOKEN, date, kg }) });
  } catch (e) { /* offline — local copy is still saved */ }
}
function fetchWeights(cb) {
  if (!SHEET_SYNC_URL) { if (cb) cb(); return; }
  jsonp(SHEET_SYNC_URL + "?action=getWeights", (err, payload) => {
    if (!err && payload && payload.weights) {
      const byDate = {};
      payload.weights.forEach(r => {
        const d = String(r[0]).slice(0, 10), kg = +r[1];
        if (d && !isNaN(kg)) byDate[d] = kg;
      });
      // keep any locally-logged days the sheet hasn't received yet, and re-push them
      weights.forEach(w => { if (!(w.date in byDate)) { byDate[w.date] = w.kg; pushWeightToSheet(w.date, w.kg); } });
      weights = Object.keys(byDate).sort().map(d => ({ date: d, kg: byDate[d] }));
      cacheWeights();
    }
    if (cb) cb();
  });
}
function refreshWeights() { fetchWeights(() => {
  if (currentTab === "home" || currentTab === "weight") render();
}); }
 
function renderWeight() {
  const s = sortedWeights();
  const latest = s.length ? s[s.length - 1] : null;
  const prev = s.length > 1 ? s[s.length - 2] : null;
  const cur = latest ? latest.kg : null;
  const dPrev = (latest && prev) ? (latest.kg - prev.kg) : null;
  const toGoal = cur != null ? (cur - WEIGHT_GOAL) : null;
 
  let html = '';
  const goalCell = goalEditing
    ? `<div class="stat goaledit">
        <div class="lbl">Goal</div>
        <input id="gInput" class="goalinput" inputmode="decimal" value="${WEIGHT_GOAL}">
        <button class="goalsave" id="gSave">Save</button>
      </div>`
    : `<div class="stat goaltap" id="goalStat"><div class="lbl">Goal</div><div class="val">${WEIGHT_GOAL} <small>kg</small></div></div>`;
  html += `<div class="stats">
    <div class="stat"><div class="lbl">Current</div><div class="val">${cur != null ? cur : "\u2014"} <small>kg</small></div></div>
    ${goalCell}
    <div class="stat"><div class="lbl">Since last</div><div class="val" style="font-size:18px">${dPrev != null ? (dPrev > 0 ? "+" : "") + dPrev.toFixed(1) + " kg" : "\u2014"}</div></div>
    <div class="stat"><div class="lbl">To goal</div><div class="val" style="font-size:18px">${toGoal != null ? (toGoal > 0.05 ? toGoal.toFixed(1) + " kg" : "reached") : "\u2014"}</div></div>
  </div>`;
 
  html += `<div class="card"><h2>Weekly weight log</h2>
    <div class="weighrow">
      <input id="wInput" class="weighinput" inputmode="decimal" placeholder="${cur != null ? cur + " kg" : "e.g. 70.5"}">
      <button class="weighbtn" id="wSave">Save</button>
    </div>
    <div class="mealhint" id="wHint"></div></div>`;
 
  const pts = s.slice(-14).map(w => ({ label: prettyShort(w.date), value: w.kg }));
  html += `<div class="card"><h2>Weight over time</h2>
    ${scatterChart(pts, { zeroBase: false, target: WEIGHT_GOAL, unit: " kg", empty: "Log your weight to start the trend." })}</div>`;
 
  if (s.length) {
    html += `<div class="seclabel">Recent entries</div>`;
    [...s].reverse().slice(0, 20).forEach(w => {
      html += `<div class="mealentry"><div class="me-top"><span class="me-label">${w.kg} kg</span><span class="me-time">${prettyDate(w.date)}</span></div></div>`;
    });
  }
 
  view.innerHTML = html;
  const inp = document.getElementById("wInput");
  const btn = document.getElementById("wSave");
  const save = () => {
    const v = parseFloat(inp.value);
    if (isNaN(v) || v <= 0) { document.getElementById("wHint").textContent = "Enter a weight in kg."; return; }
    logWeight(Math.round(v * 10) / 10);
    render();
  };
  btn.onclick = save;
  inp.onkeydown = (e) => { if (e.key === "Enter") save(); };
 
  if (goalEditing) {
    const gInp = document.getElementById("gInput");
    const gBtn = document.getElementById("gSave");
    const gSave = () => {
      const v = parseFloat(gInp.value);
      if (isNaN(v) || v <= 0) { gInp.focus(); return; }
      setGoal(Math.round(v * 10) / 10);
      goalEditing = false;
      render();
    };
    gBtn.onclick = gSave;
    gInp.onkeydown = (e) => { if (e.key === "Enter") gSave(); else if (e.key === "Escape") { goalEditing = false; render(); } };
    gInp.focus();
    gInp.select();
  } else {
    const gStat = document.getElementById("goalStat");
    if (gStat) gStat.onclick = () => { goalEditing = true; render(); };
  }
  wireHome();
}
 
// ---------- Tabs + save ----------
document.getElementById("saveBtn").onclick = saveSession;
 
// ---------- Day rollover ----------
// If the app is left open across midnight, "today" goes stale. Re-render
// (and re-pull meals) whenever the local date changes — on a timer, when the
// tab regains focus, and when it becomes visible again.
let _lastSeenDay = isoToday();
function checkDayRollover() {
  const now = isoToday();
  if (now !== _lastSeenDay) {
    _lastSeenDay = now;
    render();          // recompute today's totals everywhere
    refreshMeals();    // re-pull so the new day starts clean
  }
}
setInterval(checkDayRollover, 60 * 1000);        // catch midnight while open
window.addEventListener("focus", checkDayRollover);
document.addEventListener("visibilitychange", () => { if (!document.hidden) checkDayRollover(); });
 
// ---------- Boot ----------
(async () => {
  await load();
  loadMealsCache();
  loadWeightCache();
  loadGoal();
  loadExListCache();
  buildDraft(currentDay);
  render();
  syncFromSheet();       // pull routine + full session history from the sheet
  refreshMeals();        // pull logged meals so the home graphs fill in
  refreshWeights();      // pull logged bodyweight from the sheet
  refreshGoal();         // pull the target weight from the sheet
  fetchExercises();      // pull the standardised exercise list from the sheet
})();
</script>
