<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Training Log</title>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Training Log" />
<meta name="theme-color" content="#EEEFF1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink: #15191F;
    --ink-soft: #5A636E;
    --ink-faint: #99A1AB;
    --paper: #EEEFF1;
    --card: #FFFFFF;
    --line: #E2E4E8;
    --accent: #F0521E;        /* track orange — actions, progression-ready */
    --accent-ink: #C23C0E;
    --up: #1E9E6B;            /* hit the target */
    --up-bg: #E5F4ED;
    --hold: #B07A12;          /* repeat / chase reps */
    --hold-bg: #FBF1DC;
    --shadow: 0 1px 2px rgba(20,24,31,.05), 0 8px 24px rgba(20,24,31,.06);
    --display: "Space Grotesk", system-ui, sans-serif;
    --body: "Inter", system-ui, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: var(--body);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 18px 16px 120px; }

  /* ---- Header ---- */
  header { padding: 6px 2px 14px; }
  .kicker {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--ink-faint); font-weight: 700;
  }
  h1 {
    font-family: var(--display); font-weight: 700; font-size: 27px;
    margin: 2px 0 0; letter-spacing: -.01em;
  }
  .sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; }

  /* ---- Tabs ---- */
  .tabs { display: flex; gap: 6px; margin: 16px 0 14px; }
  .tab {
    flex: 1; border: none; background: transparent; font-family: var(--display);
    font-weight: 600; font-size: 13px; color: var(--ink-soft);
    padding: 9px 0; border-radius: 10px; cursor: pointer; transition: .15s;
  }
  .tab.on { background: var(--ink); color: #fff; }

  /* ---- Day selector ---- */
  .days { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .day {
    border: 1.5px solid var(--line); background: var(--card); border-radius: 13px;
    padding: 12px 13px; text-align: left; cursor: pointer; transition: .15s;
    box-shadow: var(--shadow);
  }
  .day.on { border-color: var(--ink); }
  .day .dname { font-family: var(--display); font-weight: 700; font-size: 15px; }
  .day .dfocus { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
  .day .dlast { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 6px; }

  /* ---- Exercise card ---- */
  .ex {
    background: var(--card); border-radius: 15px; padding: 15px 15px 13px;
    margin-bottom: 11px; box-shadow: var(--shadow);
  }
  .ex-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .ex-name { font-family: var(--display); font-weight: 700; font-size: 15.5px; letter-spacing: -.01em; }
  .ex-target { font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft); white-space: nowrap; }
  .ex-note { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; }

  .chip {
    display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono);
    font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 20px; margin-top: 9px;
  }
  .chip.up { background: var(--up-bg); color: var(--up); }
  .chip.hold { background: var(--hold-bg); color: var(--hold); }
  .chip.new { background: #ECEEF1; color: var(--ink-soft); }

  .sets { margin-top: 11px; display: flex; flex-direction: column; gap: 7px; }
  .set-row { display: grid; grid-template-columns: 22px 1fr 1fr; gap: 8px; align-items: center; }
  .set-no { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); font-weight: 700; }
  .field { position: relative; }
  .field input {
    width: 100%; border: 1.5px solid var(--line); border-radius: 10px;
    padding: 11px 38px 11px 12px; font-family: var(--mono); font-size: 15px; font-weight: 700;
    color: var(--ink); background: #FBFBFC; outline: none; transition: .15s;
  }
  .field input:focus { border-color: var(--accent); background: #fff; }
  .field .unit {
    position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint); pointer-events: none;
  }
  .set-head { display: grid; grid-template-columns: 22px 1fr 1fr; gap: 8px; margin-bottom: -2px; }
  .set-head span { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
  .set-head span:first-child { visibility: hidden; }

  .setctl { display: flex; gap: 8px; margin-top: 10px; }
  .setbtn {
    flex: 1; border: 1.5px dashed var(--line); background: transparent; border-radius: 10px;
    padding: 9px; font-family: var(--display); font-weight: 600; font-size: 12.5px;
    color: var(--ink-soft); cursor: pointer; transition: .15s;
  }
  .setbtn:disabled { opacity: .35; cursor: default; }
  .setbtn.add { color: var(--accent-ink); border-color: rgba(240,82,30,.35); }
  .setbtn.add:active { background: rgba(240,82,30,.06); }

  /* ---- Save bar ---- */
  .savebar {
    position: fixed; left: 0; right: 0; bottom: 0; padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--paper) 70%, rgba(238,239,241,0));
  }
  .savebar .inner { max-width: 480px; margin: 0 auto; }
  .btn {
    width: 100%; border: none; border-radius: 13px; padding: 15px; cursor: pointer;
    font-family: var(--display); font-weight: 700; font-size: 15px; transition: .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 6px 16px rgba(240,82,30,.28); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { background: var(--ink-faint); box-shadow: none; }
  .savehint { text-align: center; font-size: 11px; color: var(--ink-soft); margin-top: 7px; min-height: 14px; }

  /* ---- History ---- */
  .hentry { background: var(--card); border-radius: 14px; padding: 13px 15px; margin-bottom: 9px; box-shadow: var(--shadow); cursor: pointer; }
  .hentry-top { display: flex; justify-content: space-between; align-items: center; }
  .hday { font-family: var(--display); font-weight: 700; font-size: 14.5px; }
  .hdate { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
  .hbody { margin-top: 9px; display: none; }
  .hbody.open { display: block; }
  .hex { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--line); font-size: 12.5px; }
  .hex:first-child { border-top: none; }
  .hex .hn { color: var(--ink-soft); }
  .hex .hv { font-family: var(--mono); font-weight: 700; font-size: 12px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--ink-soft); }
  .empty .big { font-family: var(--display); font-weight: 700; font-size: 17px; color: var(--ink); margin-bottom: 6px; }

  /* ---- Progress ---- */
  .pcard { background: var(--card); border-radius: 14px; padding: 14px 15px; margin-bottom: 9px; box-shadow: var(--shadow); }
  .pname { font-family: var(--display); font-weight: 700; font-size: 14px; margin-bottom: 9px; }
  .ptrack { display: flex; align-items: flex-end; gap: 5px; height: 56px; }
  .pbar { flex: 1; background: #ECEEF1; border-radius: 5px 5px 0 0; position: relative; min-height: 4px; }
  .pbar.last { background: var(--accent); }
  .pbar .pv { position: absolute; top: -16px; left: 0; right: 0; text-align: center; font-family: var(--mono); font-size: 9.5px; color: var(--ink-soft); }
  .pdates { display: flex; gap: 5px; margin-top: 4px; }
  .pdates span { flex: 1; text-align: center; font-family: var(--mono); font-size: 9px; color: var(--ink-faint); }

  /* ---- Dashboard ---- */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat { background: var(--card); border-radius: 14px; padding: 13px 14px; box-shadow: var(--shadow); }
  .stat .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
  .stat .val { font-family: var(--display); font-weight: 700; font-size: 23px; margin-top: 3px; letter-spacing: -.01em; }
  .stat .val small { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .card { background: var(--card); border-radius: 16px; padding: 15px 15px 13px; margin-bottom: 11px; box-shadow: var(--shadow); }
  .card h2 { font-family: var(--display); font-weight: 700; font-size: 15px; margin: 0 0 2px; }
  .card .csub { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 12px; }
  .chart { width: 100%; height: auto; display: block; }
  .axis { font-family: var(--mono); font-size: 9px; fill: var(--ink-faint); }
  .seclabel { font-family: var(--display); font-weight: 700; font-size: 14px; margin: 16px 2px 9px; }

  .toolbtn {
    width: 100%; border: 1.5px solid var(--line); background: var(--card); border-radius: 12px;
    padding: 13px; font-family: var(--display); font-weight: 600; font-size: 13.5px;
    color: var(--ink); cursor: pointer; margin-top: 9px;
  }
  .toolbtn.danger { color: var(--accent-ink); }
  .csvhint { font-size: 11.5px; color: var(--ink-soft); margin: 12px 2px 6px; }
  .csvbox {
    width: 100%; height: 120px; border: 1.5px solid var(--line); border-radius: 12px;
    padding: 11px 12px; font-family: var(--mono); font-size: 11px; color: var(--ink);
    background: #FBFBFC; resize: vertical; outline: none;
  }
  .confirm { font-size: 12.5px; color: var(--ink); margin: 12px 2px 4px; font-weight: 600; }
  .loading { text-align: center; padding: 60px 20px; color: var(--ink-faint); font-family: var(--mono); font-size: 13px; }
</style>

<div class="app">
  <header>
    <div class="kicker">Upper · Lower — Machines</div>
    <h1>Training Log</h1>
    <div class="sub">Recomp · machine &amp; cable based · back-care plan</div>
  </header>

  <div class="tabs">
    <button class="tab on" data-tab="log">Log</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="dashboard">Dashboard</button>
  </div>

  <div id="view"><div class="loading">Loading your log…</div></div>
</div>

<div class="savebar" id="savebar" style="display:none">
  <div class="inner">
    <button class="btn btn-primary" id="saveBtn">Save session</button>
    <div class="savehint" id="saveHint"></div>
  </div>
</div>

<script>
// ---------- Standalone storage ----------
// Inside Claude, window.storage exists. On its own, fall back to the
// browser's localStorage so the same file works either place.
if (!window.storage) {
  window.storage = {
    async get(key)        { const v = localStorage.getItem(key); return v == null ? null : { key, value: v }; },
    async set(key, value) { localStorage.setItem(key, value); return { key, value }; },
    async delete(key)     { localStorage.removeItem(key); return { key, deleted: true }; },
    async list(prefix="") { const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix)); return { keys, prefix }; },
  };
}

const STORE_KEY = "ulp-tracker-v1";

// ====== GOOGLE SHEET SYNC (optional) ======
// Paste your Apps Script web-app URL between the quotes to turn on
// auto-saving to your Google Sheet. Leave it empty to keep sync off.
const SHEET_SYNC_URL = "https://script.google.com/macros/s/AKfycbzG95eHofU9IyW3c0s8jS8xFPlAOHqIwzlB01oo6roXTqtGE_WoOr1o8c1NEzm0Zgfu/exec";
// ==========================================

// ---------- The plan ----------
const PLAN = {
  "Upper A": { focus: "Push — chest, shoulders, triceps", ex: [
    { id:"chestpress", name:"Chest press machine", sets:3, lo:8, hi:10, type:"kg", note:"Seat so handles line up with mid-chest." },
    { id:"seatedrow",  name:"Seated row (chest pad)", sets:3, lo:8, hi:12, type:"kg", note:"Chest on the pad, back protected." },
    { id:"shoulderpress", name:"Shoulder press machine", sets:3, lo:8, hi:12, type:"kg" },
    { id:"latraise", name:"Lateral raise machine", sets:3, lo:12, hi:15, type:"kg", note:"Go light — these humble everyone." },
    { id:"tripush", name:"Triceps pushdown (cable)", sets:3, lo:12, hi:15, type:"kg" },
  ]},
  "Lower A": { focus: "Quads · hamstrings · core", ex: [
    { id:"legpress", name:"Leg press", sets:3, lo:10, hi:12, type:"kg", note:"Back & hips on the pad — don't let your lower back curl off at the bottom." },
    { id:"legext", name:"Leg extension", sets:3, lo:12, hi:12, type:"kg" },
    { id:"legcurl", name:"Seated leg curl", sets:3, lo:12, hi:12, type:"kg" },
    { id:"calf", name:"Calf raises", sets:2, lo:15, hi:20, type:"kg" },
    { id:"deadbug", name:"Dead bug", sets:2, lo:8, hi:10, type:"bw", note:"Resist the movement, don't crunch." },
    { id:"sideplank", name:"Side plank", sets:2, lo:20, hi:30, type:"sec", note:"Per side. Hips stacked." },
  ]},
  "Upper B": { focus: "Pull — back, biceps, rear delts", ex: [
    { id:"latpull", name:"Lat pulldown", sets:3, lo:8, hi:12, type:"kg" },
    { id:"cablerow", name:"Seated cable row", sets:3, lo:10, hi:12, type:"kg", note:"Sit tall — pull to your stomach without rocking back." },
    { id:"pressany", name:"Chest or shoulder press", sets:3, lo:10, hi:12, type:"kg", note:"Whichever machine is free." },
    { id:"facepull", name:"Face pulls", sets:3, lo:15, hi:15, type:"kg", note:"Great for posture if you sit a lot." },
    { id:"bicep", name:"Cable bicep curls", sets:3, lo:10, hi:12, type:"kg" },
  ]},
  "Lower B": { focus: "Glutes · hamstrings · calves · core", ex: [
    { id:"hipthrust", name:"Hip thrust machine", sets:3, lo:10, hi:12, type:"kg", note:"Bodyweight bridges if no machine. No spinal load." },
    { id:"legpresshigh", name:"Leg press (feet high)", sets:3, lo:10, hi:12, type:"kg", note:"Higher feet shift work to glutes & hams." },
    { id:"legcurlb", name:"Lying / seated leg curl", sets:3, lo:12, hi:12, type:"kg" },
    { id:"hipab", name:"Hip abduction machine", sets:2, lo:12, hi:15, type:"kg", note:"Glute med — side-hip strength supports the lower back." },
    { id:"calfb", name:"Calf raises", sets:2, lo:15, hi:20, type:"kg" },
  ]},
};
const DAYS = Object.keys(PLAN);

// ---------- State ----------
let data = { sessions: [] };
let currentDay = "Lower A";
let currentTab = "log";
let draft = {};   // { exId: [{w, r}, ...] }

// ---------- Storage ----------
async function load() {
  try {
    const res = await window.storage.get(STORE_KEY);
    if (res && res.value) data = JSON.parse(res.value);
  } catch (e) { /* empty / first run */ }
  if (!data.sessions) data.sessions = [];
  if (!data.seeded) {
    if (data.sessions.length === 0) seed();
    data.seeded = true;
    await persist();   // lock in the seed + flag so it's stable across reloads
  }
}
async function persist() {
  try { await window.storage.set(STORE_KEY, JSON.stringify(data)); }
  catch (e) { return false; }
  return true;
}

// Mirror the whole log into your Google Sheet (fire-and-forget).
// localStorage stays the source of truth, so a failed sync never loses data.
async function syncToSheet() {
  if (!SHEET_SYNC_URL) return;
  const rows = [];
  data.sessions.forEach(s => {
    const dp = PLAN[s.day]; if (!dp) return;
    dp.ex.forEach(ex => {
      const sets = s.ex[ex.id]; if (!sets) return;
      sets.forEach((x, i) => rows.push([s.date, s.day, ex.name, i+1, ex.type==="kg"?(x.w||""):"BW", x.r||""]));
    });
  });
  try {
    await fetch(SHEET_SYNC_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ rows })
    });
  } catch (e) { /* offline or blocked — localStorage still has everything */ }
}

// Seed: today's Lower A calibration session
function seed() {
  const today = isoToday();
  data.sessions.push({
    date: today, day: "Lower A",
    ex: {
      legpress: [{w:10,r:10},{w:10,r:10},{w:10,r:12}],
      legext:   [{w:10,r:10},{w:10,r:10},{w:10,r:10}],
      legcurl:  [{w:10,r:12},{w:10,r:12},{w:10,r:12}],
      calf:     [{w:20,r:12},{w:20,r:12}],
      deadbug:  [{w:0,r:9},{w:0,r:9}],
      sideplank:[{w:0,r:20},{w:0,r:20}],
    }
  });
}

// ---------- Helpers ----------
function isoToday() { const d = new Date(); return d.toISOString().slice(0,10); }
function prettyDate(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, { weekday:"short", day:"numeric", month:"short" });
}
function lastSession(day) {
  const list = data.sessions.filter(s => s.day === day);
  return list.length ? list[list.length - 1] : null;
}
function unitLabel(ex) { return ex.type === "sec" ? "sec" : (ex.type === "bw" ? "reps" : "kg"); }

// Suggestion based on last session
function suggestion(ex, last) {
  if (!last || !last.ex[ex.id]) return { cls:"new", text:"First time — start light" };
  const sets = last.ex[ex.id];
  const reps = sets.map(s => +s.r || 0);
  const allTop = reps.every(r => r >= ex.hi);
  const allMin = reps.every(r => r >= ex.lo);
  if (ex.type === "bw" || ex.type === "sec") {
    return allTop ? { cls:"up", text:"Solid — add a set or hold longer" }
                  : { cls:"hold", text:"Repeat — build the time" };
  }
  if (allTop) return { cls:"up", text:"Ready to add weight (≈+2.5 kg)" };
  if (allMin) return { cls:"hold", text:"Hold weight — push the top reps" };
  return { cls:"hold", text:"Hold weight — chase the rep target" };
}

// ---------- Build draft for a day (prefilled from last session) ----------
function buildDraft(day) {
  const last = lastSession(day);
  draft = {};
  PLAN[day].ex.forEach(ex => {
    const prev = last && last.ex[ex.id];
    const n = prev ? prev.length : ex.sets;   // start with however many sets you did last time
    draft[ex.id] = [];
    for (let i = 0; i < n; i++) {
      const p = prev && prev[i];
      draft[ex.id].push({ w: p ? p.w : "", r: p ? p.r : "" });
    }
  });
}

// ---------- Render ----------
const view = document.getElementById("view");
const savebar = document.getElementById("savebar");

function render() {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("on", t.dataset.tab === currentTab));
  if (currentTab === "log") renderLog();
  else if (currentTab === "history") renderHistory();
  else renderDashboard();
  savebar.style.display = currentTab === "log" ? "block" : "none";
}

function renderLog() {
  let html = '<div class="days">';
  DAYS.forEach(day => {
    const last = lastSession(day);
    const lastTxt = last ? `last ${prettyDate(last.date)}` : "not logged yet";
    html += `<button class="day ${day===currentDay?"on":""}" data-day="${day}">
      <div class="dname">${day}</div>
      <div class="dfocus">${PLAN[day].focus}</div>
      <div class="dlast">${lastTxt}</div>
    </button>`;
  });
  html += "</div>";

  const last = lastSession(currentDay);
  PLAN[currentDay].ex.forEach(ex => {
    const sug = suggestion(ex, last);
    const targetStr = ex.type === "sec"
      ? `${ex.sets} × ${ex.lo}–${ex.hi}s`
      : (ex.lo === ex.hi ? `${ex.sets} × ${ex.lo}` : `${ex.sets} × ${ex.lo}–${ex.hi}`);
    const u = unitLabel(ex);
    const showWeight = ex.type === "kg";

    let rows = `<div class="set-head"><span></span><span>${showWeight?"weight":"&nbsp;"}</span><span>${u==="kg"?"reps":u}</span></div>`;
    draft[ex.id].forEach((s, i) => {
      rows += `<div class="set-row">
        <div class="set-no">${i+1}</div>
        ${showWeight
          ? `<div class="field"><input inputmode="decimal" data-ex="${ex.id}" data-i="${i}" data-k="w" value="${s.w}" placeholder="–"><span class="unit">kg</span></div>`
          : `<div class="field"><input value="BW" disabled style="color:var(--ink-faint)"></div>`}
        <div class="field"><input inputmode="numeric" data-ex="${ex.id}" data-i="${i}" data-k="r" value="${s.r}" placeholder="–"><span class="unit">${u==="kg"?"reps":u}</span></div>
      </div>`;
    });

    html += `<div class="ex">
      <div class="ex-top"><div class="ex-name">${ex.name}</div><div class="ex-target">${targetStr}</div></div>
      ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ""}
      <span class="chip ${sug.cls}">${sug.text}</span>
      <div class="sets">${rows}</div>
      <div class="setctl">
        <button class="setbtn rem" data-rem="${ex.id}" ${draft[ex.id].length<=1?"disabled":""}>− Remove set</button>
        <button class="setbtn add" data-add="${ex.id}">+ Add set</button>
      </div>
    </div>`;
  });

  view.innerHTML = html;

  view.querySelectorAll(".day").forEach(b => b.onclick = () => {
    currentDay = b.dataset.day; buildDraft(currentDay); render();
  });
  view.querySelectorAll("input[data-ex]").forEach(inp => {
    inp.oninput = () => { draft[inp.dataset.ex][+inp.dataset.i][inp.dataset.k] = inp.value; };
  });
  view.querySelectorAll("[data-add]").forEach(b => b.onclick = () => {
    draft[b.dataset.add].push({ w:"", r:"" }); render();
  });
  view.querySelectorAll("[data-rem]").forEach(b => b.onclick = () => {
    const arr = draft[b.dataset.rem];
    if (arr.length > 1) { arr.pop(); render(); }
  });
}

async function saveSession() {
  const exObj = {};
  let any = false;
  PLAN[currentDay].ex.forEach(ex => {
    exObj[ex.id] = draft[ex.id].map(s => {
      const w = ex.type === "kg" ? (s.w === "" ? "" : +s.w) : 0;
      const r = s.r === "" ? "" : +s.r;
      if (r !== "") any = true;
      return { w, r };
    });
  });
  const hint = document.getElementById("saveHint");
  if (!any) { hint.textContent = "Enter at least one set first."; return; }

  // Replace a same-day same-type entry made today, else append
  const today = isoToday();
  const idx = data.sessions.findIndex(s => s.date === today && s.day === currentDay);
  const entry = { date: today, day: currentDay, ex: exObj };
  if (idx >= 0) data.sessions[idx] = entry; else data.sessions.push(entry);

  const ok = await persist();
  if (ok) syncToSheet();
  hint.textContent = ok
    ? (SHEET_SYNC_URL ? "Saved ✓  — synced to your sheet" : "Saved ✓  — carried into your history")
    : "Couldn't save — try again";
  if (ok) setTimeout(() => { hint.textContent = ""; render(); }, 1200);
}

function renderHistory() {
  if (data.sessions.length === 0) {
    view.innerHTML = `<div class="empty"><div class="big">No sessions yet</div>Log a workout and it'll show up here.</div>`;
    return;
  }
  const sorted = [...data.sessions].sort((a,b) => b.date.localeCompare(a.date));
  let html = "";
  sorted.forEach((s, si) => {
    const dayPlan = PLAN[s.day];
    let body = "";
    if (dayPlan) dayPlan.ex.forEach(ex => {
      const sets = s.ex[ex.id];
      if (!sets) return;
      const val = sets.map(x => {
        if (ex.type === "kg") return `${x.w||"–"}×${x.r||"–"}`;
        if (ex.type === "sec") return `${x.r||"–"}s`;
        return `${x.r||"–"}`;
      }).join("  ");
      body += `<div class="hex"><span class="hn">${ex.name}</span><span class="hv">${val}</span></div>`;
    });
    html += `<div class="hentry" data-h="${si}">
      <div class="hentry-top"><div class="hday">${s.day}</div><div class="hdate">${prettyDate(s.date)}</div></div>
      <div class="hbody" id="hb-${si}">${body}</div>
    </div>`;
  });
  html += `<button class="toolbtn" id="exportBtn">Export to CSV (copy for Google Sheets)</button>`;
  html += `<div id="exportOut"></div>`;
  html += `<div id="resetZone"><button class="toolbtn danger" id="resetBtn">Clear all data</button></div>`;
  view.innerHTML = html;

  view.querySelectorAll(".hentry").forEach(h => h.onclick = () => {
    document.getElementById("hb-" + h.dataset.h).classList.toggle("open");
  });
  document.getElementById("exportBtn").onclick = exportCSV;
  document.getElementById("resetBtn").onclick = armReset;
}

function buildCSV() {
  const rows = [["date","day","exercise","set","weight_kg","reps_or_sec"]];
  data.sessions.forEach(s => {
    const dp = PLAN[s.day];
    if (!dp) return;
    dp.ex.forEach(ex => {
      const sets = s.ex[ex.id]; if (!sets) return;
      sets.forEach((x, i) => rows.push([s.date, s.day, ex.name, i+1, ex.type==="kg"?(x.w||""):"BW", x.r||""]));
    });
  });
  return rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
}

async function exportCSV() {
  const csv = buildCSV();
  let copied = false;
  try { await navigator.clipboard.writeText(csv); copied = true; } catch (e) { /* clipboard blocked — fall back to manual copy */ }
  const out = document.getElementById("exportOut");
  out.innerHTML = `<div class="csvhint">${copied
      ? "Copied to clipboard ✓ — open a Google Sheet and paste. Or copy again from the box below."
      : "Tap inside the box, select all, and copy — then paste into a Google Sheet."}</div>
    <textarea class="csvbox" readonly>${csv.replace(/</g,"&lt;")}</textarea>`;
  const ta = out.querySelector("textarea");
  ta.focus(); ta.select();
}

function armReset() {
  const zone = document.getElementById("resetZone");
  zone.innerHTML = `<div class="confirm">Clear every logged session? This can't be undone.</div>
    <button class="toolbtn danger" id="resetYes">Yes, clear everything</button>
    <button class="toolbtn" id="resetNo">Cancel</button>`;
  document.getElementById("resetYes").onclick = doReset;
  document.getElementById("resetNo").onclick = () => render();
}

async function doReset() {
  data = { sessions: [], seeded: true };   // stay empty, don't re-seed on reload
  await persist();
  syncToSheet();
  buildDraft(currentDay);
  render();
}

// ---------- Dashboard helpers ----------
function daysAgo(dateStr) {
  const d = new Date(dateStr + "T00:00:00"), now = new Date();
  return Math.round((now.setHours(0,0,0,0) - d.setHours(0,0,0,0)) / 86400000);
}
function prettyShort(dateStr) {
  return new Date(dateStr + "T00:00:00").toLocaleDateString(undefined, { day:"numeric", month:"short" });
}
// One entry per session, with total weighted volume (weight × reps)
function dashSessions() {
  return data.sessions.map(s => {
    const dp = PLAN[s.day]; let vol = 0;
    if (dp) dp.ex.forEach(ex => {
      if (ex.type !== "kg") return;
      const sets = s.ex[ex.id]; if (!sets) return;
      sets.forEach(x => { vol += (+x.w || 0) * (+x.r || 0); });
    });
    return { date: s.date, day: s.day, volume: vol };
  }).sort((a,b) => a.date.localeCompare(b.date));
}
// Hand-drawn SVG line/area chart of volume over time
function volumeChart(sessions) {
  if (sessions.length < 2) {
    const v = sessions.length ? Math.round(sessions[0].volume).toLocaleString() : 0;
    return `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft);padding:6px 0">
      ${v} kg so far — log another session to start the trend.</div>`;
  }
  const W = 320, H = 120, padL = 6, padR = 6, padT = 16, padB = 18;
  const vals = sessions.map(s => s.volume);
  const max = Math.max(...vals), min = Math.min(...vals, 0);
  const span = (max - min) || 1;
  const x = i => padL + (i * (W - padL - padR)) / (sessions.length - 1);
  const y = v => padT + (1 - (v - min) / span) * (H - padT - padB);
  let line = "", area = `M ${x(0)} ${H - padB}`;
  sessions.forEach((s, i) => {
    const px = x(i), py = y(s.volume);
    line += (i ? " L " : "M ") + px.toFixed(1) + " " + py.toFixed(1);
    area += ` L ${px.toFixed(1)} ${py.toFixed(1)}`;
  });
  area += ` L ${x(sessions.length - 1)} ${H - padB} Z`;
  let dots = "", labels = "";
  sessions.forEach((s, i) => {
    const lastOne = i === sessions.length - 1;
    const show = sessions.length <= 8 || i === 0 || lastOne || i === Math.floor(sessions.length / 2);
    dots += `<circle cx="${x(i).toFixed(1)}" cy="${y(s.volume).toFixed(1)}" r="${lastOne ? 3.5 : 2.2}" fill="${lastOne ? 'var(--accent)' : 'var(--ink-faint)'}"/>`;
    if (show) labels += `<text class="axis" x="${x(i).toFixed(1)}" y="${H - 5}" text-anchor="middle">${prettyShort(s.date)}</text>`;
  });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <path d="${area}" fill="var(--accent)" opacity="0.08"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${labels}
  </svg>`;
}

function renderDashboard() {
  if (!data.sessions.length) {
    view.innerHTML = `<div class="empty"><div class="big">No sessions yet</div>Log a workout and your dashboard fills in.</div>`;
    return;
  }
  const sessions = dashSessions();
  const totalVol = sessions.reduce((a, x) => a + x.volume, 0);
  const last = sessions[sessions.length - 1];
  const ago = daysAgo(last.date);
  const lastTxt = ago <= 0 ? "Today" : ago === 1 ? "Yesterday" : ago + " days ago";
  const week = sessions.filter(s => daysAgo(s.date) <= 6).length;

  let html = `<div class="stats">
    <div class="stat"><div class="lbl">Sessions</div><div class="val">${sessions.length}</div></div>
    <div class="stat"><div class="lbl">Last 7 days</div><div class="val">${week} <small>session${week===1?"":"s"}</small></div></div>
    <div class="stat"><div class="lbl">Total volume</div><div class="val">${Math.round(totalVol).toLocaleString()} <small>kg</small></div></div>
    <div class="stat"><div class="lbl">Last trained</div><div class="val" style="font-size:18px">${lastTxt}</div></div>
  </div>`;

  html += `<div class="card"><h2>Volume per session</h2>
    <div class="csub">Total weight moved (weight × reps) each session</div>
    ${volumeChart(sessions.slice(-14))}</div>`;

  // Per-exercise top working weight
  const weighted = [];
  DAYS.forEach(day => PLAN[day].ex.forEach(ex => { if (ex.type === "kg") weighted.push({ day, ex }); }));
  let bodyEx = "";
  weighted.forEach(({day, ex}) => {
    const hist = data.sessions.filter(s => s.day === day && s.ex[ex.id])
      .sort((a,b) => a.date.localeCompare(b.date))
      .map(s => ({ date: s.date, w: Math.max(...s.ex[ex.id].map(x => +x.w || 0)) }));
    if (!hist.length) return;
    const max = Math.max(...hist.map(h => h.w), 1);
    let bars = "", dates = "";
    hist.slice(-6).forEach((h, i, arr) => {
      const isLast = i === arr.length - 1;
      const ht = Math.max(8, (h.w / max) * 100);
      bars += `<div class="pbar ${isLast?"last":""}" style="height:${ht}%"><span class="pv">${h.w}</span></div>`;
      dates += `<span>${prettyShort(h.date)}</span>`;
    });
    bodyEx += `<div class="pcard"><div class="pname">${ex.name} <span style="color:var(--ink-faint);font-weight:400">· ${day}</span></div>
      <div class="ptrack">${bars}</div><div class="pdates">${dates}</div></div>`;
  });
  if (bodyEx) html += `<div class="seclabel">Working weight by exercise</div>` + bodyEx;

  view.innerHTML = html;
}

// ---------- Tabs + save ----------
document.querySelectorAll(".tab").forEach(t => t.onclick = () => { currentTab = t.dataset.tab; render(); });
document.getElementById("saveBtn").onclick = saveSession;

// ---------- Boot ----------
(async () => {
  await load();
  buildDraft(currentDay);
  render();
})();
</script>
